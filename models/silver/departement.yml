models:
  - name: departement
    config:
      contract:
        enforced: true

    columns:
      - name: departement_code
        data_type: int
        constraints:
          - type: not_null
          - type: primary_key

      - name: departement_name
        data_type: string
        constraints:
          - type: not_null

      - name: region_code
        data_type: int
        constraints:
          - type: not_null

      - name: region_name
        data_type: string
        constraints:
          - type: not_null
