        constraints:
          - type: not_null
      - name: categorie_formule
        data_type: string
        constraints:
          - type: not_null
      - name: type_beneficiaire
        data_type: string
        constraints:
          - type: not_null
      - name: categorie
        data_type: string
        constraints:
          - type: not_null
      - name: famille_metier
        data_type: string
        constraints:
          - type: not_null
      - name: libelle_profession
        data_type: string
        constraints:
          - type: not_null